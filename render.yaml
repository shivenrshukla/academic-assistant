# render.yaml
# Blueprint to deploy both the Node.js Backend and Python AI Service

services:
  # 1. Python AI Service (FastAPI / Qdrant)
  - type: web
    name: academic-assistant-ai
    env: python
    region: ohio # or your preferred region
    rootDir: ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn qdrant_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Specify python version for stability
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # 2. Node.js Backend
  - type: web
    name: academic-assistant-backend
    env: node
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        sync: false # Set this in Render dashboard to your Vercel URL
      - key: PYTHON_SERVICE_URL
        fromService:
          type: web
          name: academic-assistant-ai
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
